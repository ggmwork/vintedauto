<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vintedauto</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5efe6;
        --panel: #fffaf2;
        --text: #1f2933;
        --accent: #ff6b35;
        --accent-deep: #cc4f22;
        --shadow: 0 24px 60px rgba(31, 41, 51, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(255, 107, 53, 0.16), transparent 38%),
          linear-gradient(135deg, var(--bg), #f0f4f8 55%, #e6ecf2);
        color: var(--text);
      }

      main {
        width: min(720px, 100%);
        padding: 40px;
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.4rem, 5vw, 4rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        max-width: 48ch;
        font-size: 1.1rem;
        line-height: 1.7;
      }

      code {
        display: inline-block;
        margin-top: 24px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 107, 53, 0.12);
        color: var(--accent-deep);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>vintedauto is live.</h1>
      <p>
        This is a minimal published version of the project, prepared for preview deployment.
        The requested plain text file is included and should be available at <strong>/test.txt</strong>.
      </p>
      <code>Preview deployment with a simple static entry point</code>
    </main>
  </body>
</html>
